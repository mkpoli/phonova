<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: 'Voces';
        src: local('Voces');
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        background: #1e1d1a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          ui-serif,
          'Iowan Old Style',
          'Palatino Linotype',
          Georgia,
          'Times New Roman',
          serif;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 34px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .mark {
        width: 156px;
        height: 156px;
        flex-shrink: 0;
      }

      .mark path {
        stroke: #5eead4;
      }

      .mark circle {
        fill: #f5b04c;
      }

      .wordmark {
        font-size: 108px;
        font-weight: 400;
        color: #eeede7;
        letter-spacing: 0.01em;
        line-height: 1;
      }

      .capabilities {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        font-size: 24px;
        font-weight: 400;
        color: #a3a096;
        letter-spacing: 0.02em;
        text-align: center;
      }

      .capabilities .sep {
        color: #5c5a52;
        margin: 0 4px;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="brand">
        <svg class="mark" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-width="7">
          <path d="M46.5 12.9 A 22 22 0 1 0 52.2 20.4" />
          <path d="M14 36 C20 24 25 24 31 32 C37 40 41 40 50 24" />
          <circle cx="52" cy="20" r="5.5" />
        </svg>
        <div class="wordmark">Phonia</div>
      </div>
      <div class="capabilities">
        Analyze Voice<span class="sep">·</span>Manage Audio<span class="sep">·</span>Show
        Spectrograms<span class="sep">·</span>Easy Annotations<span class="sep">·</span>Draw Plots
      </div>
    </div>
  </body>
</html>
