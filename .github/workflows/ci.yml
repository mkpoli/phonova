name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-check:
    name: fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C target-feature=+simd128
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown -p phx-wasm

  cargo-deny:
    name: cargo-deny (licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: licenses

  oracle:
    name: oracle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/oracle
    steps:
      - uses: actions/checkout@v7
      - name: Check for committed references
        id: refs
        run: |
          count=$(find references -name '*.json' 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "::notice::no reference JSON under tools/oracle/references -- oracle job skipped"
          fi
      - name: Install uv
        if: steps.refs.outputs.count != '0'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install parselmouth
        id: install
        if: steps.refs.outputs.count != '0'
        continue-on-error: true
        run: |
          if uv sync --extra parselmouth; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Report parselmouth unavailable
        if: steps.refs.outputs.count != '0' && steps.install.outputs.available != 'true'
        run: echo "::warning::praat-parselmouth did not install on this runner -- oracle job skipped, not failed"
      - name: Regenerate references and diff against committed fixtures
        if: steps.refs.outputs.count != '0' && steps.install.outputs.available == 'true'
        run: |
          rm -rf /tmp/oracle-fresh
          uv run oracle generate --out-dir /tmp/oracle-fresh
          uv run oracle diff-all --measured-dir /tmp/oracle-fresh

  figcheck:
    name: figcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build figcheck toolchain container
        id: build
        continue-on-error: true
        run: docker build -t figcheck:ci tools/figcheck
      - name: Report container unavailable
        if: steps.build.outcome != 'success'
        run: echo "::warning::figcheck container did not build on this runner -- figcheck job skipped, not failed"
      - name: Run figcheck self-test (tiny known-good/known-bad fixtures)
        if: steps.build.outcome == 'success'
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work figcheck:ci tools/figcheck/selftest.sh
      - name: Check for committed figure exports
        if: steps.build.outcome == 'success'
        run: |
          count=$(find crates/phx-figure -type f \( -name '*.typ' -o -name '*.tex' -o -name '*.vega.json' \) 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::notice::no committed figure exports under crates/phx-figure -- figcheck ran the harness self-test only"
          fi

  deploy:
    name: deploy phonia.app
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - run: cargo install wasm-pack --locked || cargo install wasm-pack
      - run: RUSTFLAGS="-C target-feature=+simd128" wasm-pack build crates/phx-wasm --target web --out-dir ../../apps/web/src/lib/wasm/pkg
      - run: bun install --frozen-lockfile
      - run: bun run build
        working-directory: apps/web
      - name: deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: bun x wrangler deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: note when secret missing
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN secret not set - deploy skipped (local wrangler deploys remain the path)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
